<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cycling Coach</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Inter, sans-serif; background: #f0f0f0; min-height: 100vh; }

/* Login */
#loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 36px 40px; width: 360px; }
.login-card h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.login-card p { font-size: 12px; color: #888; margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label { font-size: 12px; font-weight: 500; color: #555; display: block; margin-bottom: 4px; }
.field input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.field input:focus { outline: none; border-color: #3b82f6; }
.btn { width: 100%; padding: 9px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; margin-top: 4px; }
.btn:hover { background: #2563eb; }
.btn-sec { background: #f5f5f5; color: #333; border: 1px solid #ddd; margin-top: 8px; }
.btn-sec:hover { background: #e8e8e8; }
.error { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab { flex: 1; padding: 7px; text-align: center; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; background: #f5f5f5; }
.tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

/* App */
#appPage { display: none; padding: 20px; }
.app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid #e0e0e0; background: #fff; border-radius: 8px; padding: 14px 20px; }
.app-header h1 { font-size: 18px; font-weight: 600; }
.app-header span { font-size: 12px; color: #888; }
.logout { font-size: 12px; color: #ef4444; cursor: pointer; background: none; border: none; }

/* Upload */
.upload-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.upload-card h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
.upload-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.upload-row .field { margin: 0; flex: 1; min-width: 150px; }
.upload-btn { padding: 8px 18px; background: #22c55e; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; white-space: nowrap; }
.upload-btn:hover { background: #16a34a; }
.upload-btn:disabled { background: #ccc; cursor: default; }

/* Notes */
.notes-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.notes-card h2 { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.notes-row { display: flex; gap: 8px; }
.notes-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.notes-row button { padding: 8px 16px; background: #f59e0b; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }

/* Coaching */
.coaching-card { background: #fff; border: 1px solid #e0e0e0; border-left: 4px solid #3b82f6; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; display: none; }
.coaching-card h2 { font-size: 12px; font-weight: 600; color: #3b82f6; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em; }
.coaching-card p { font-size: 13px; color: #333; line-height: 1.6; }

/* Dashboard iframe */
.dashboard-frame { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
.dashboard-frame h2 { font-size: 13px; font-weight: 600; padding: 14px 20px; border-bottom: 1px solid #e0e0e0; }
iframe { width: 100%; height: 700px; border: none; }

.status { font-size: 12px; color: #888; margin-top: 8px; }
.status.ok { color: #22c55e; }
.status.err { color: #ef4444; }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-card">
    <h1>🚴 Cycling Coach</h1>
    <p>AI-powered ride analytics & coaching</p>
    <div class="tabs">
      <div class="tab active" onclick="setTab('login')">Sign in</div>
      <div class="tab" onclick="setTab('register')">Register</div>
    </div>

    <div id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"></div>
      <button class="btn" onclick="login()">Sign in</button>
      <div class="error" id="loginErr"></div>
    </div>

    <div id="registerForm" style="display:none">
      <div class="field"><label>Name</label><input type="text" id="regName" placeholder="Your name"></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="regPass" placeholder="••••••••"></div>
      <button class="btn" onclick="register()">Create account</button>
      <div class="error" id="regErr"></div>
    </div>
  </div>
</div>

<!-- APP PAGE -->
<div id="appPage">
  <div class="app-header">
    <div>
      <h1>🚴 Cycling Coach</h1>
      <span id="welcomeMsg"></span>
    </div>
    <button class="logout" onclick="logout()">Sign out</button>
  </div>

  <div class="upload-card">
    <h2>📁 Upload a FIT file</h2>
    <div class="upload-row">
      <div class="field"><label>FIT file(s) — select one or many</label><input type="file" id="fitFile" accept=".fit" multiple></div>
      <div class="field"><label>Ride notes (optional)</label><input type="text" id="rideNotes" placeholder="How did it feel?"></div>
      <button class="upload-btn" id="uploadBtn" onclick="uploadFit()">Upload & Analyze</button>
    </div>
    <div class="status" id="uploadStatus"></div>
  </div>

  <div class="coaching-card" id="coachingCard">
    <h2>🏆 Coach's assessment</h2>
    <p id="coachingText"></p>
  </div>

  <div class="notes-card">
    <h2>📝 Add a personal note (injuries, goals, health context)</h2>
    <div class="notes-row">
      <input type="text" id="noteText" placeholder="e.g. Recovering from COVID, targeting 6500 miles this year">
      <button onclick="addNote()">Save note</button>
    </div>
    <div class="status" id="noteStatus"></div>
  </div>

  <div class="dashboard-frame">
    <h2>📊 Your Dashboard</h2>
    <iframe id="dashFrame" src="about:blank"></iframe>
  </div>
</div>

<script>
const API = "https://cycling-app-production.up.railway.app";
let token = localStorage.getItem("cc_token") || "";
let userName = localStorage.getItem("cc_name") || "";

function setTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
  document.getElementById('loginForm').style.display    = tab === 'login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
}

async function login() {
  const email = document.getElementById('loginEmail').value;
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const res  = await fetch(API + "/login", { method: "POST",
      headers: {"Content-Type": "application/x-www-form-urlencoded"},
      body: "email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail; err.style.display='block'; return; }
    token = data.token; userName = data.name;
    localStorage.setItem("cc_token", token);
    localStorage.setItem("cc_name", userName);
    showApp();
  } catch(e) { err.textContent = "Connection error"; err.style.display='block'; }
}

async function register() {
  const name  = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const pass  = document.getElementById('regPass').value;
  const err   = document.getElementById('regErr');
  err.style.display = 'none';
  try {
    const res  = await fetch(API + "/register", { method: "POST",
      headers: {"Content-Type": "application/x-www-form-urlencoded"},
      body: "name=" + encodeURIComponent(name) + "&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(pass) });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.detail; err.style.display='block'; return; }
    token = data.token; userName = data.name;
    localStorage.setItem("cc_token", token);
    localStorage.setItem("cc_name", userName);
    showApp();
  } catch(e) { err.textContent = "Connection error"; err.style.display='block'; }
}

function logout() {
  localStorage.removeItem("cc_token");
  localStorage.removeItem("cc_name");
  token = ""; userName = "";
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appPage').style.display   = 'none';
}

async function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display   = 'block';
  document.getElementById('welcomeMsg').textContent  = "Welcome back, " + userName;
  loadDashboard();
}

async function loadDashboard() {
  const res  = await fetch(API + "/dashboard", { headers: { Authorization: "Bearer " + token } });
  const html = await res.text();
  const frame = document.getElementById('dashFrame');
  frame.srcdoc = html;
}

async function uploadFit() {
  const fileInput = document.getElementById('fitFile');
  const notes     = document.getElementById('rideNotes').value;
  const status    = document.getElementById('uploadStatus');
  const btn       = document.getElementById('uploadBtn');
  const files     = Array.from(fileInput.files);
  if (!files.length) { status.textContent = "Please select at least one FIT file"; status.className='status err'; return; }
  btn.disabled = true;
  let lastCoaching = null;
  let successCount = 0;
  let errors = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    status.textContent = "Uploading " + (i+1) + " of " + files.length + ": " + file.name + "...";
    status.className = 'status';
    try {
      const form = new FormData();
      form.append("file", file);
      form.append("notes", notes);
      const res  = await fetch(API + "/upload", { method: "POST",
        headers: { Authorization: "Bearer " + token }, body: form });
      const data = await res.json();
      if (!res.ok) { errors.push(file.name + ": " + data.detail); continue; }
      successCount++;
      if (data.coaching && data.coaching !== "AI coaching unavailable.") {
        lastCoaching = data.coaching;
      }
    } catch(e) {
      errors.push(file.name + ": " + e.message);
    }
  }
  btn.disabled = false;
  if (successCount > 0) {
    status.textContent = successCount + " of " + files.length + " ride(s) uploaded successfully." + (errors.length ? " " + errors.length + " failed." : "");
    status.className = 'status ok';
  } else {
    status.textContent = "All uploads failed: " + errors.join(", ");
    status.className = 'status err';
  }
  if (lastCoaching) {
    document.getElementById('coachingText').textContent = lastCoaching;
    document.getElementById('coachingCard').style.display = 'block';
  }
  loadDashboard();
}

async function addNote() {
  const note   = document.getElementById('noteText').value;
  const status = document.getElementById('noteStatus');
  if (!note) return;
  const res = await fetch(API + "/notes", { method: "POST",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/x-www-form-urlencoded" },
    body: "note=" + encodeURIComponent(note) });
  if (res.ok) {
    status.textContent = "Note saved ✓";
    status.className = 'status ok';
    document.getElementById('noteText').value = '';
    setTimeout(() => status.textContent = '', 3000);
  }
}

// Auto-login if token exists
if (token) showApp();
</script>
</body>
</html>
